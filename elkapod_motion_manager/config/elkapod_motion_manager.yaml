/**:
  ros__parameters:
    base_height:
      default: 0.11
      min: 0.09
      max: 0.16
    leg_spacing:
      default: 0.1
      min: 0.1
      max: 0.2
    roll:
      max_rad: 0.05236
    pitch:
      max_rad: 0.10472
    max_vel:
      tripod: 0.2
      wave: 0.05
      ripple: 0.15
    max_angular_vel:
      tripod: 0.5
      wave: 0.5
      ripple: 0.5

elkapod_gait:
  ros__parameters:
    trajectory:
      frequency_hz: 50.0

    gait:
      min_swing_time_sec: 0.42
      default_phase_lag: 0.05 # 5% na cały cykl
      step:
        height:             # parametry min i max do doprecyzowania
          default: 0.025
          min: 0.05       
          max: 0.15
    roll:
      pid:
        k: 2.0
        ti: 0.2
        td: 0.0
        cmd_lo: -0.1
        cmd_hi: 0.1
    pitch:
      pid:
        k: 1.2
        ti: 0.2
        td: 0.0
        cmd_lo: -0.2
        cmd_hi: 0.2

elkapod_motion_manager:
  ros__parameters:
    standing_up:
      base_height_waypoint: 0.12
      leg_spacing_waypoint: 0.275

    trajectory:
      frequency_hz: 100.0
