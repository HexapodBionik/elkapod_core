/**:
  ros__parameters:
    base_height:
      default: 0.12
      min: 0.09
      max: 0.16
    leg_spacing:
      default: 0.175
      min: 0.1
      max: 0.25

elkapod_gait:
  ros__parameters:
    trajectory:
      frequency_hz: 50.0

    gait:
      min_swing_time_sec: 0.42
      default_phase_lag: 0.05 # 5% na cały cykl

      step:
        length:             # tutaj też min będzie można lepiej dobrać
          default: 0.15
          min: 0.1
          max: 0.2
        height:             # parametry min i max do doprecyzowania
          default: 0.025
          min: 0.05       
          max: 0.15
    roll:
      max_rad: 0.05236
      pid:
        k: 2.0
        ti: 0.2
        td: 0.0
        cmd_lo: -0.4
        cmd_hi: 0.4
    pitch:
      max_rad: 0.10472
      pid:
        k: 1.2
        ti: 0.2
        td: 0.0
        cmd_lo: -0.4
        cmd_hi: 0.4

elkapod_motion_manager:
  ros__parameters:
    standing_up:
      base_height_waypoint: 0.12
      leg_spacing_waypoint: 0.27

    trajectory:
      frequency_hz: 100.0
    
