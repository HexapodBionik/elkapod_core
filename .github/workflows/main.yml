name: elkapod
on:
  push:
  pull_request:
    branches:
      - "main"
    types: [opened]

jobs:
  linting:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup workspace
        run: |
          mkdir -p ros_ws/src
      - uses: actions/checkout@v3
        with:
          path: ros_ws/src
      - name: Configure linter
        run: |
          sudo apt update
          pip3 install ruff
          cd ros_ws/src/
          echo $(pwd)
          ruff check . --select C4 --select SIM --select TCH

  build:
    # Create a container of the latest Ubuntu, other values could be
    # ubuntu-latest, ubuntu-22.04, etc.
    needs: linting
    runs-on: ubuntu-24.04

    steps:
      # Install some system pacakges
      - name: Install ROS 2 Jazzy packages && dependencies
        run: |
          sudo apt update
          sudo apt install -y software-properties-common libserial-dev
          sudo add-apt-repository -y universe
          sudo apt update && sudo apt install -y curl
          export ROS_APT_SOURCE_VERSION=$(curl -s https://api.github.com/repos/ros-infrastructure/ros-apt-source/releases/latest | grep -F "tag_name" | awk -F\" '{print $4}')
          curl -L -o /tmp/ros2-apt-source.deb "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${ROS_APT_SOURCE_VERSION}/ros2-apt-source_${ROS_APT_SOURCE_VERSION}.$(. /etc/os-release && echo ${UBUNTU_CODENAME:-${VERSION_CODENAME}})_all.deb"
          sudo dpkg -i /tmp/ros2-apt-source.deb
          sudo apt update
          sudo apt install -y ros-jazzy-ros-base python3-colcon-common-extensions
          sudo apt install -y lcov
          sudo apt install -y python3-vcstool
          sudo apt install ros-jazzy-twist-mux -y
          sudo apt install ros-jazzy-ros2-control ros-jazzy-ros2-controllers ros-jazzy-gz-ros2-control -y
          sudo apt install -y python3-rosdep

      - name: Setup Workspace
        run: |
          mkdir -p ros_ws/src

      # We want to use GitHub CI checkout version 3 for checking out the branch
      - uses: actions/checkout@v3
        with:
          path: ros_ws/src

      - name: Clone elkapod_msgs package
        run: |
          cd ros_ws/
          git clone https://github.com/HexapodBionik/elkapod_msgs.git -b main src/elkapod_msgs/

      - name: Install dependencies with rosdep
        run: |
          cd ros_ws
          sudo apt-get update
          sudo rosdep init
          rosdep update
          rosdep install --from-paths src --ignore-src -y --rosdistro jazzy

      - name: Build Workspace
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros_ws
          colcon build --cmake-args -DCMAKE_CXX_FLAGS="-Werror"
