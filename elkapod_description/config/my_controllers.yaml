controller_manager:
  ros__parameters:
    update_rate: 50

    hardware_components_initial_state:
      shutdown_on_initial_state_failure: true

    enforce_command_limits: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    elkapod_ik_controller:
      type: elkapod_ik_controller/ElkapodIKController

    passthrough_controller:          
      type: passthrough_controller/PassthroughController

    imu_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

elkapod_ik_controller:
  ros__parameters:
    joints:
      - leg1_J1
      - leg1_J2
      - leg1_J3
      - leg2_J1
      - leg2_J2
      - leg2_J3
      - leg3_J1
      - leg3_J2
      - leg3_J3
      - leg4_J1
      - leg4_J2
      - leg4_J3
      - leg5_J1
      - leg5_J2
      - leg5_J3
      - leg6_J1
      - leg6_J2
      - leg6_J3
    m1: [0.0, 0.0, 0.025]
    a1: [0.0676, 0.0, 0.0]
    a2: [0.09237, 0.0, 0.0]
    a3: [0.22524, 0.0, 0.0]

imu_broadcaster:
  ros__parameters:
    type: imu_sensor_broadcaster/IMUSensorBroadcaster
    sensor_name: imu_sensor
    frame_id: imu_link
