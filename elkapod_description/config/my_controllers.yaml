controller_manager:
  ros__parameters:
    update_rate: 50

    hardware_components_initial_state:
      inactive:
        - "ElkapodGaitController"

    hardware_components_initial_state:
      shutdown_on_initial_state_failure: true

    enforce_command_limits: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    elkapod_ik_controller:
      type: elkapod_ik_controller/ElkapodIKController
    
    elkapod_gait_controller:
      type: elkapod_gait_controller/ElkapodGaitController
      state: inactive

    imu_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    

elkapod_ik_controller:
  ros__parameters:
    joints:
      - leg1_J1
      - leg1_J2
      - leg1_J3
      - leg2_J1
      - leg2_J2
      - leg2_J3
      - leg3_J1
      - leg3_J2
      - leg3_J3
      - leg4_J1
      - leg4_J2
      - leg4_J3
      - leg5_J1
      - leg5_J2
      - leg5_J3
      - leg6_J1
      - leg6_J2
      - leg6_J3
    m1: [0.0, 0.0, 0.025]
    a1: [0.0676, 0.0, 0.0]
    a2: [0.09237, 0.0, 0.0]
    a3: [0.22524, 0.0, 0.0]

elkapod_gait_controller:
  ros__parameters:
    joints:
      - elkapod_ik_controller/leg1_x/point 
      - elkapod_ik_controller/leg1_y/point 
      - elkapod_ik_controller/leg1_z/point 
      - elkapod_ik_controller/leg2_x/point 
      - elkapod_ik_controller/leg2_y/point 
      - elkapod_ik_controller/leg2_z/point 
      - elkapod_ik_controller/leg3_x/point 
      - elkapod_ik_controller/leg3_y/point 
      - elkapod_ik_controller/leg3_z/point 
      - elkapod_ik_controller/leg4_x/point 
      - elkapod_ik_controller/leg4_y/point 
      - elkapod_ik_controller/leg4_z/point 
      - elkapod_ik_controller/leg5_x/point 
      - elkapod_ik_controller/leg5_y/point 
      - elkapod_ik_controller/leg5_z/point 
      - elkapod_ik_controller/leg6_x/point 
      - elkapod_ik_controller/leg6_y/point 
      - elkapod_ik_controller/leg6_z/point 
    gait:
      min_swing_time_sec: 0.42
      default_phase_lag: 0.0
      step:
        height:             
          default_step_height: 0.025
          min: 0.05       
          max: 0.15
    roll:
      pid:
        k: 0.3
        ti: 10.0
        td: 0.0
        cmd_lo: -0.1
        cmd_hi: 0.1
    pitch:
      pid:
        k: 0.3
        ti: 10.0
        td: 0.0
        cmd_lo: -0.2
        cmd_hi: 0.2
    publish_debug_info: true

imu_broadcaster:
  ros__parameters:
    type: imu_sensor_broadcaster/IMUSensorBroadcaster
    sensor_name: imu_sensor
    frame_id: imu_link
