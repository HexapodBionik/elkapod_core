elkapod_gait_controller:
  joints: {
    type: string_array,
    default_value: [],
    description: "",
    validation: {
      not_empty<>: []
    }
  }
  gait:
    min_swing_time_sec:
      type: double
      default_value: 0.4
      description: ""
      validation:
        bounds<>: [0.2, 0.6]
    default_phase_lag:
      type: double
      default_value: 0.0
      description: ""
      validation:
        bounds<>: [0.0, 0.2]
    step:
      height:
        default_step_height:
          type: double
          default_value: 0.025
          description: ""
          validation:
            bounds<>: [0.015, 0.6]
  roll:
    max_rad:
      type: double
      default_value: 0.05236
      description: ""
      validation: 
        bounds<>: [0.05, 0.6]
      
    pid:
      k:
        type: double
        default_value: 2.0
        description: ""
        validation:
          bounds<>: [0.0, 100]
      ti:
        type: double
        default_value: 0.2
        description: ""
        validation:
          bounds<>: [0.0, 100]
      td:
        type: double
        default_value: 0.0
        description: ""
        validation:
          bounds<>: [0.0, 100]
      cmd_lo:
        type: double
        default_value: -0.1
        description: ""
        validation: 
          bounds<>: [-0.4, 0.0]
        
      cmd_hi:
        type: double
        default_value: 0.1
        description: ""
        validation: 
          bounds<>: [0.0, 0.4]
  pitch:
    max_rad:
      type: double
      default_value: 0.10472
      description: ""
      validation: 
        bounds<>: [0.1, 0.11]
    pid:
      k:
        type: double
        default_value: 1.2
        description: ""
        validation:
          bounds<>: [0.0, 100]
      ti:
        type: double
        default_value: 0.2
        description: ""
        validation:
          bounds<>: [0.0, 100]
      td:
        type: double
        default_value: 0.0
        description: ""
        validation:
          bounds<>: [0.0, 100]
      cmd_lo:
        type: double
        default_value: -0.2
        description: ""
        validation: 
          bounds<>: [-0.4, 0.0]
      cmd_hi:
        type: double
        default_value: 0.2
        description: ""
        validation: 
          bounds<>: [0.0, 0.4]
        
  base_height:
    default_base_height:
      type: double
      default_value: 0.11
      description: ""
      validation:
        bounds<>: [0.09, 0.16]
  leg_spacing:
    default_leg_spacing:
      type: double
      default_value: 0.1
      description: ""
      validation:
        bounds<>: [0.1, 0.15]
  max_vel:
    tripod:
      type: double
      default_value: 0.15
      description: ""
      validation: 
        bounds<>: [0.0, 0.4]
    wave:
      type: double
      default_value: 0.05
      description: ""
      validation: 
        bounds<>: [0.0, 0.1]

    ripple:
      type: double
      default_value: 0.1
      description: ""
      validation: 
        bounds<>: [0.0, 0.2]

  max_angular_vel:
    tripod:
      type: double
      default_value: 0.5
      description: ""
      validation: 
        bounds<>: [0.0, 0.6]
    wave:
      type: double
      default_value: 0.5
      description: ""
      validation: 
        bounds<>: [0.0, 0.6]
    ripple:
      type: double
      default_value: 0.5
      description: ""
      validation: 
        bounds<>: [0.0, 0.6]
